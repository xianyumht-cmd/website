    <!-- Consolidated JavaScript Functions -->
    <script>
        // Wait for DOM and jQuery to be ready
        $(document).ready(function() {
            // Time Display Function
            function getTime() {
                var e = new Date,
                    t = e.getFullYear(),
                    n = e.getMonth() + 1,
                    r = e.getDate(),
                    g = e.getHours();
                g = g < 10 ? "0" + g : g;
                var a = e.getMinutes();
                a = a < 10 ? "0" + a : a;
                var o = e.getSeconds();
                return t + "年" + n + "月" + r + "日&nbsp;" + g + ":" + a + ":" + (o = o < 10 ? "0" + o : o) + "&nbsp星期" + ["日", "一", "二", "三", "四", "五", "六"][e.getDay()];
            }
            
            // Update Time Function
            function updateUpdateTime() {
                const lastUpdate = new Date();
                const now = new Date();
                const diffTime = now - lastUpdate;
                const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
                
                if (diffHours === 0) {
                    document.getElementById("sitetime").textContent = "今天更新";
                } else {
                    document.getElementById("sitetime").textContent = `${diffHours}小时前更新`;
                }
            }
            
            // Auto Scroll Function
            function AutoScroll(i, n) {
                $(i).find("ul:first").animate({
                    marginTop: "-" + n + "px"
                }, 500, function() {
                    $(this).css({
                        marginTop: "0px"
                    }).find("li:first").appendTo(this);
                });
            }
            
            // Scroll Handler (optimized with throttling)
            let scrollTimeout;
            $(window).scroll(function() {
                if (scrollTimeout) {
                    clearTimeout(scrollTimeout);
                }
                scrollTimeout = setTimeout(function() {
                    let top = $(window).scrollTop();
                    $("black_overlay").css("top", 6 + top + "px");
                    $("light").css("top", 6 + top + "px");
                }, 16); // ~60fps
            });
            
            // Initialize time display
            if (document.querySelector(".box")) {
                setInterval(function() {
                    document.querySelector(".box").innerHTML = getTime();
                }, 1000);
            }
            
            // Initialize update time
            setInterval(updateUpdateTime, 1000);
            updateUpdateTime();
            
            // Initialize auto scroll for bulletin
            var bulletinItems = $(".bulletin-ul").children();
            if (bulletinItems.length > 1) {
                var itemHeight = $(bulletinItems[0]).height();
                setInterval(function() {
                    AutoScroll(".bulletin", itemHeight);
                }, 1000);
            }
            
            // Generate content
            generateContent();
        });
        
        // Simplified page loading management
        window.addEventListener('load', function() {
            // Hide loading indicator
            const loadingElement = document.getElementById('loading');
            if (loadingElement) {
                loadingElement.style.display = 'none';
            }
            
            // Show main content
            const mainContent = document.querySelector('main, .main-content, body > .container');
            if (mainContent) {
                mainContent.style.opacity = '1';
            }
        });
        
        // WAU Script removed - no CDN usage
    </script>

    <script>

            if (window.pageLoadingState) {

            }
            
            // Add event listeners to all preloaded resources
            var preloadedResources = document.querySelectorAll('link[rel="preload"]');
            preloadedResources.forEach(function(resource) {
                resource.addEventListener('load', function() {
                    if (window.pageLoadingState) window.pageLoadingState.resourceLoaded();
                });
                resource.addEventListener('error', function() {
                    if (window.pageLoadingState) window.pageLoadingState.resourceLoaded();
                });
            });
            
            // Force check completion after a short delay
            setTimeout(function() {
                if (window.pageLoadingState) window.pageLoadingState.checkLoadingComplete();
            }, 1000); // Reduced fallback timeout
        });
    </script>
