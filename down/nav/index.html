                    var txt = String(input.value || "").trim().toLowerCase();

                    if (!txt) {

                    cards.forEach(function(el) {

                    });

            <!-- Content Generation Script -->
            <script>
                // 生成菜单和内容的函数
                function generateContent() {
                    if (typeof navData === 'undefined') {
                        console.error('navData not loaded. Please ensure nav-data.js is included.');
                        return;
                    }
                    
                    // 生成侧边栏菜单
                    const mainMenu = document.getElementById('main-menu');
                    let menuHTML = '';
                    
                    navData.sections.forEach(section => {
                        menuHTML += `
                            <li>
                                <a class="smooth" href="#${section.id}">
                                    <i class="${section.icon}"></i>
                                    <span class="title">${section.title}</span>
                                </a>
                            </li>`;
                    });
                    
                    menuHTML += `
                        <hr style="margin-bottom: 32px; border-top: none;">
                        <li class="submit-tag">
                            <a href="/about.html">
                                <i class="fa-solid fa-circle-info"></i>
                                <span class="tooltip-blue" style="width: 60px;">关于本站</span>
                            </a>
                        </li>`;
                    
                    mainMenu.innerHTML = menuHTML;
                    
                    // 生成公告内容
                    const bulletinContent = document.getElementById('bulletin-content');
                    bulletinContent.innerHTML = `
                        <li class="overflowClip_1 scrolltext-title">
                            <a rel="bulletin">当前游戏版本:</a>
                            <a style="color: red;">${navData.gameInfo.version}</a>
                            <a rel="bulletin">更新时间:</a>
                            <a style="color: red;">${navData.gameInfo.updateDate}</a>
                            <a rel="bulletin">预计下版本更新时间:</a>
                            <a style="color: red;">${navData.gameInfo.nextUpdateDate}</a>
                            <a rel="bulletin">未找到新FF或地址失效反馈邮箱:</a>
                            <a href="mailto:${navData.gameInfo.feedbackEmail}" target="_blank" style="color: red;">${navData.gameInfo.feedbackEmail}</a>
                        </li>`;
                    
                    const contentSections = document.getElementById('content-sections');
                    if (!contentSections) return;
                    contentSections.innerHTML = '';

                    const tasks = navData.sections.map(section => () => {
                        let html = `
                            <h4 class="text-gray">
                                <i class="fa-solid fa-tags" style="margin-right: 7px;" id="${section.id}"></i>
                                ${section.title}
                            </h4>
                            <div class="row">`;
                        section.items.forEach(item => {
                            html += `
                                <div class="col-sm-3">
                                    <div class="box2 label-info xe-conversations xe-widget"
                                         onclick='window.open("${item.url}", "_blank")'
                                         data-original-title="${item.tooltip}"
                                         data-placement="bottom"
                                         data-toggle="tooltip">
                                        <div class="xe-comment-entry">
                                            <a class="xe-user-img" href="javascript:void(0)">
                                                <div class="user-avatar"
                                                     style="background-color: #007bff; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                                    ${item.avatar}
                                                </div>
                                            </a>
                                            <div class="xe-comment">
                                                <a class="overflowClip_1 xe-user-name" href="javascript:void(0)">
                                                    <strong>${item.title}</strong>
                                                </a>
                                                <p class="overflowClip_2">${item.description}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>`;
                        });
                        html += `</div><br>`;
                        contentSections.insertAdjacentHTML('beforeend', html);
                    });

                    const runChunk = (deadline) => {
                        const start = performance.now();
                        while (tasks.length) {
                            if (deadline && deadline.timeRemaining && deadline.timeRemaining() < 8) break;
                            if (!deadline && performance.now() - start > 12) break;
                            const fn = tasks.shift();
                            fn && fn();
                        }
                        if (tasks.length) {
                            if ('requestIdleCallback' in window) {
                                requestIdleCallback(runChunk, { timeout: 200 });
                            } else {
                                setTimeout(runChunk, 0);
                            }
                        }
                    };

                    if ('requestIdleCallback' in window) {
                        requestIdleCallback(runChunk, { timeout: 200 });
                    } else {
                        setTimeout(runChunk, 0);
                    }
                }

    <!-- Optimized Scripts (loaded at bottom for better performance with callbacks) -->
    <!-- Consolidated JavaScript Functions -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            function getTime() {
                var e = new Date();
                var t = e.getFullYear();
                var n = e.getMonth() + 1;
                var r = e.getDate();
                var g = e.getHours();
                g = g < 10 ? "0" + g : g;
                var a = e.getMinutes();
                a = a < 10 ? "0" + a : a;
                var o = e.getSeconds();
                o = o < 10 ? "0" + o : o;
                return t + "年" + n + "月" + r + "日&nbsp;" + g + ":" + a + ":" + o + "&nbsp星期" + ["日", "一", "二", "三", "四", "五", "六"][e.getDay()];
            }

            var lastUpdateDate = null;
            function resolveLastUpdateDate() {
                try {
                    if (window.navData && window.navData.gameInfo && window.navData.gameInfo.updateDate) {
                        var parsed = new Date(window.navData.gameInfo.updateDate);
                        if (!isNaN(parsed.getTime())) lastUpdateDate = parsed;
                    }
                } catch (e) {}
            }
            function updateUpdateTime() {
                var el = document.getElementById("sitetime");
                if (!el) return;
                var now = new Date();
                var base = lastUpdateDate || now;
                var diffTime = now - base;
                var diffMinutes = Math.floor(diffTime / (1000 * 60));
                if (diffMinutes <= 0) {
                    el.textContent = "刚刚更新";
                    return;
                }
                var diffHours = Math.floor(diffMinutes / 60);
                if (diffHours <= 0) {
                    el.textContent = diffMinutes + "分钟前更新";
                } else if (diffHours < 24) {
                    el.textContent = diffHours + "小时前更新";
                } else {
                    var diffDays = Math.floor(diffHours / 24);
                    el.textContent = diffDays + "天前更新";
                }
            }

            var fade = document.getElementById("fade");
            var light = document.getElementById("light");
            var scrollPending = false;
            window.addEventListener("scroll", function() {
                if (scrollPending) return;
                scrollPending = true;
                requestAnimationFrame(function() {
                    scrollPending = false;
                    var top = window.pageYOffset || document.documentElement.scrollTop || 0;
                    var px = 6 + top + "px";
                    if (fade) fade.style.top = px;
                    if (light) light.style.top = px;
                });
            }, { passive: true });

            var box = document.querySelector(".box");
            if (box) {
                setInterval(function() {
                    box.innerHTML = getTime();
                }, 1000);
            }

            resolveLastUpdateDate();
            updateUpdateTime();
            setInterval(updateUpdateTime, 60 * 1000);

            var bulletinUl = document.querySelector(".bulletin-ul");
            if (bulletinUl && bulletinUl.children && bulletinUl.children.length > 1) {
                var autoScroll = function() {
                    var first = bulletinUl.children[0];
                    if (!first) return;
                    var h = first.getBoundingClientRect().height;
                    bulletinUl.style.transition = "margin-top 0.5s";
                    bulletinUl.style.marginTop = "-" + h + "px";
                    setTimeout(function() {
                        bulletinUl.style.transition = "none";
                        bulletinUl.appendChild(first);
                        bulletinUl.style.marginTop = "0";
                    }, 520);
                };
                setInterval(autoScroll, 3000);
            }

            var schedule = function() {
                requestAnimationFrame(function() {
                    requestAnimationFrame(function() {
                        generateContent();
                        resolveLastUpdateDate();
                        updateUpdateTime();
                    });
                });
            };
            schedule();
        });
        
        // Simplified page loading management
        window.addEventListener('load', function() {
            // Hide loading indicator
            const loadingElement = document.getElementById('loading');
            if (loadingElement) {
                loadingElement.style.display = 'none';

            // Show main content
            const mainContent = document.querySelector('main, .main-content, body > .container');
            if (mainContent) {
                mainContent.style.opacity = '1';
            }
        });

    </script>
